spring.application.name=oms-backend
server.port=8080

# ---------------- MySQL (Workbench) ----------------
spring.datasource.url=jdbc:mysql://localhost:3306/oms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Subha@7847
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------- JPA / Hibernate ----------------
# Use 'update' so Hibernate keeps entities in sync with the oms_schema.sql tables.
# Set to 'validate' once schema is stable, or 'none' if you manage schema fully via the SQL script.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ---------------- File storage (invoices, product images) ----------------
app.upload.invoice-dir=uploads/invoices
app.upload.product-image-dir=uploads/products
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---------------- JWT ----------------
app.jwt.secret=oms-super-secret-key-change-this-in-production-min-256-bits-long
app.jwt.expiration-ms=86400000

# ---------------- CORS ----------------
app.cors.allowed-origins=http://localhost:4200

# ---------------- Logging ----------------
logging.level.root=INFO
logging.level.com.oms.backend=DEBUG
logging.file.name=logs/oms-backend.log
